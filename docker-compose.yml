version: "3.8"

services:
  # --- The Spatial Database Layer ---
  db:
    image: postgis/postgis:16-3.4
    container_name: moria
    restart: always
    environment:
      POSTGRES_USER: moria_admin
      POSTGRES_PASSWORD: production_secure_password_replace_me
      POSTGRES_DB: moria_db
    shm_size: 2gb
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres 
      -c shared_buffers=4GB 
      -c work_mem=64MB 
      -c maintenance_work_mem=1GB 
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moria_admin -d moria_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moria-production-net

  # --- The Next.js App Router Layer ---
  frontend:
    container_name: moria-nextjs-frontend
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://moria_admin:production_secure_password_replace_me@db:5432/moria_db
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moria-production-net
    restart: always

  # --- Secure Administration Tooling ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: production_admin_password_replace_me
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moria-production-net

volumes:
  pgdata:

networks:
  moria-production-net:
    driver: bridge
